name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "Pre-installed SDK contents:"
          ls -la "$ANDROID_SDK" 2>/dev/null || echo "No pre-installed SDK"
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager --list_installed | head -20

      - name: Setup Gradle
        run: |
          GRADLE_VERSION=8.4
          cd /tmp
          curl -L -o gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"
          gradle --version | head -5

      - name: Create Android project structure
        run: |
          PROJECT=/tmp/adarkroom-android
          mkdir -p "$PROJECT/app/src/main/java/com/doublespeakgames/adarkroom"
          mkdir -p "$PROJECT/app/src/main/res/values"
          mkdir -p "$PROJECT/app/src/main/assets/www"
          echo "Project structure created"

      - name: Copy game files to assets
        run: |
          PROJECT=/tmp/adarkroom-android
          cp -r "$GITHUB_WORKSPACE"/* "$PROJECT/app/src/main/assets/www/"
          cd "$PROJECT/app/src/main/assets/www"
          rm -rf tools doc .git .github
          rm -f .gitattributes .gitignore .jshintrc package.json yarn.lock dev-server.js
          rm -f browserWarning.html mobileWarning.html README.md LICENSE.md contributing.md
          echo "Game files copied"
          ls

      - name: Adapt index.html for WebView
        run: |
          cd /tmp/adarkroom-android/app/src/main/assets/www
          python3 << 'PYEOF'
          import re
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          viewport = '<meta name="viewport" content="width=device-width, initial-scale=0.42, minimum-scale=0.25, maximum-scale=2.5, user-scalable=yes" />'
          html = re.sub(r'(<meta charset="UTF-8"[^>]*>)', r'\1\n\t' + viewport, html, count=1)
          html = re.sub(r'<script src="https://ajax\.googleapis\.com/ajax/libs/jquery/[^"]+"></script>\s*<script>\s*if\(!window\.jQuery\).*?</script>', '<script src="lib/jquery.min.js"></script>', html, count=1, flags=re.DOTALL)
          html = re.sub(r'\s*<!-- Google tag.*?</script>\s*', '\n\t', html, count=1, flags=re.DOTALL)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print("index.html adapted")
          PYEOF

      - name: Write Gradle build files
        run: |
          PROJECT=/tmp/adarkroom-android

          cat > "$PROJECT/settings.gradle" << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ADarkRoom"
          include ':app'
          EOF

          cat > "$PROJECT/build.gradle" << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.4' apply false
          }
          EOF

          cat > "$PROJECT/gradle.properties" << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

          cat > "$PROJECT/app/build.gradle" << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.doublespeakgames.adarkroom'
              compileSdk 34
              defaultConfig {
                  applicationId "com.doublespeakgames.adarkroom"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.4.0"
              }
              buildTypes {
                  debug {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          echo "Gradle build files written"

      - name: Write AndroidManifest.xml
        run: |
          cat > /tmp/adarkroom-android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar.Fullscreen"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "AndroidManifest.xml written"

      - name: Write MainActivity.java
        run: |
          cat > /tmp/adarkroom-android/app/src/main/java/com/doublespeakgames/adarkroom/MainActivity.java << 'EOF'
          package com.doublespeakgames.adarkroom;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setBuiltInZoomControls(true);
                  settings.setDisplayZoomControls(false);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          return false;
                      }
                  });
                  webView.loadUrl("file:///android_asset/www/index.html");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF
          echo "MainActivity.java written"

      - name: Write resources
        run: |
          cat > /tmp/adarkroom-android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">A Dark Room</string>
          </resources>
          EOF
          echo "Resources written"

      - name: Build Debug APK
        run: |
          cd /tmp/adarkroom-android
          echo "=== Checking gradle ==="
          which gradle || echo "gradle not in PATH"
          gradle --version 2>&1 | head -5
          echo "=== Starting build ==="
          gradle assembleDebug 2>&1 | tail -100
          echo "BUILD_EXIT=${PIPESTATUS[0]}"
          exit ${PIPESTATUS[0]}
        shell: bash

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: adarkroom-debug-apk
          path: /tmp/adarkroom-android/app/build/outputs/apk/debug/*.apk

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            /tmp/adarkroom-android/app/build/reports/
            /tmp/adarkroom-android/build/
          if-no-files-found: ignore
