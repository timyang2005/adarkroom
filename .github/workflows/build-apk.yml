name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Setup Android SDK manually
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          curl -L -o cmdtools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "Android SDK commandline tools installed"
          ls "$ANDROID_HOME/cmdline-tools/latest/bin/"

      - name: Install Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager --list_installed

      - name: Verify environment
        run: |
          echo "=== Node ===" && node --version
          echo "=== Java ===" && java -version
          echo "=== JAVA_HOME ===" && echo "$JAVA_HOME"
          echo "=== Cordova ===" && cordova --version
          echo "=== ANDROID_HOME ===" && echo "$ANDROID_HOME"
          echo "=== ANDROID_SDK_ROOT ===" && echo "$ANDROID_SDK_ROOT"
          echo "=== sdkmanager ===" && which sdkmanager
          echo "=== adb ===" && which adb
          echo "=== build-tools ===" && ls "$ANDROID_HOME/build-tools/"
          echo "=== platforms ===" && ls "$ANDROID_HOME/platforms/"

      - name: Create Cordova project
        run: cordova create /tmp/adarkroom-build com.doublespeakgames.adarkroom "A Dark Room"

      - name: Copy game sources as www
        run: |
          cd /tmp/adarkroom-build
          rm -rf www
          cp -r "$GITHUB_WORKSPACE" www
          cd www
          rm -rf .git .github tools doc
          rm -f .gitattributes .gitignore .jshintrc
          rm -f package.json yarn.lock dev-server.js
          rm -f browserWarning.html mobileWarning.html
          rm -f README.md LICENSE.md contributing.md

      - name: Adapt index.html for mobile
        run: |
          cd /tmp/adarkroom-build/www
          python3 << 'PYEOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          viewport = '<meta name="viewport" content="width=device-width, initial-scale=0.42, minimum-scale=0.25, maximum-scale=2.5, user-scalable=yes" />'
          html = re.sub(
              r'(<meta charset="UTF-8"[^>]*>)',
              r'\1\n\t' + viewport,
              html, count=1
          )

          html = re.sub(
              r'<script src="https://ajax\.googleapis\.com/ajax/libs/jquery/[^"]+"></script>\s*<script>\s*if\(!window\.jQuery\).*?</script>',
              '<script src="lib/jquery.min.js"></script>',
              html, count=1, flags=re.DOTALL
          )

          html = re.sub(
              r'\s*<!-- Google tag.*?</script>\s*',
              '\n\t',
              html, count=1, flags=re.DOTALL
          )

          html = re.sub(
              r'(</head>)',
              r'\t<script src="cordova.js"></script>\n\1',
              html, count=1
          )

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print("index.html updated successfully")
          print("--- First 40 lines ---")
          lines = html.split('\n')
          for i, line in enumerate(lines[:40], 1):
              print(f"{i:3d} {line}")
          PYEOF

      - name: Write Cordova config.xml
        run: |
          python3 -c '
          import textwrap
          config = textwrap.dedent("""\
              <?xml version="1.0" encoding="utf-8"?>
              <widget id="com.doublespeakgames.adarkroom" version="1.4.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
                  <name>A Dark Room</name>
                  <description>A minimalist text adventure, packaged for Android with Apache Cordova.</description>
                  <author email="michael@doublespeakgames.com" href="https://github.com/doublespeakgames/adarkroom">Michael Townsend and friends</author>
                  <content src="index.html" />
                  <access origin="*" />
                  <allow-intent href="http://*/*" />
                  <allow-intent href="https://*/*" />
                  <allow-intent href="market:*" />
                  <preference name="Orientation" value="default" />
                  <preference name="BackgroundColor" value="0xFF000000" />
                  <preference name="android-targetSdkVersion" value="34" />
                  <preference name="android-compileSdkVersion" value="34" />
                  <platform name="android">
                      <preference name="android-minSdkVersion" value="24" />
                      <icon src="www/img/adr.png" />
                  </platform>
              </widget>
          """)
          with open("/tmp/adarkroom-build/config.xml", "w", encoding="utf-8") as f:
              f.write(config)
          print("config.xml written successfully")
          '

      - name: Add Android platform
        run: |
          cd /tmp/adarkroom-build
          cordova platform add android@13
          echo "=== Platforms ==="
          cordova platform ls
          echo "=== config.xml ==="
          cat config.xml

      - name: Build Debug APK
        id: build
        run: |
          cd /tmp/adarkroom-build
          set +e
          cordova build android --debug 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit=$BUILD_EXIT" >> "$GITHUB_OUTPUT"
          echo "Build exit code: $BUILD_EXIT"
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== Build failed. Last 100 lines ==="
            tail -100 /tmp/build.log
          fi
          exit $BUILD_EXIT
        shell: bash

      - name: Find APK
        id: find_apk
        if: success()
        run: |
          APK=$(find /tmp/adarkroom-build/platforms/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "APK: $APK"
          ls -lh "$APK"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: adarkroom-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          if-no-files-found: ignore
